site_name: Medical Q&A RAG Pipeline
site_url: https://minghao.github.io/qna_medical_referenced/
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.fold
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
plugins:
  - search
markdown_extensions:
  - pymdownx.blocks.caption
  - md_in_html
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
nav:
  - Home: index.md
  - Notebooks:
      - Overview: notebooks/index.md
      - Data Exploration: notebooks/data-exploration.md
      - Chunking Strategy Analysis: notebooks/chunking-strategy-analysis.md
      - Ingestion Pipeline: notebooks/ingestion-pipeline.md
      - Retrieval Pipeline: notebooks/retrieval-pipeline.md
      - Ablation Analysis: notebooks/feature-ablation-analysis.md
