services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    volumes:
      - ./src:/app/src:ro
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - MODEL_NAME=${MODEL_NAME:-qwen3.5-flash}
      - RATE_LIMIT_PER_MINUTE=0
    cpus: 1.0
    mem_limit: 1g
    mem_reservation: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    cpus: 0.5
    mem_limit: 256m
    mem_reservation: 128m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173"]
      interval: 30s
      timeout: 5s
      retries: 5

  test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    profiles:
      - test
    working_dir: /app
    environment:
      - CI=true
      - PLAYWRIGHT_BASE_URL=http://frontend:5173
      - API_URL=http://backend:8000
    cpus: 2.0
    mem_limit: 2g
    mem_reservation: 1g
    depends_on:
      frontend:
        condition: service_healthy
