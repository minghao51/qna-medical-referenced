services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
    ports:
      - "8000:8000"
    environment:
      - APP__LLM__DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - APP__LLM__QWEN_BASE_URL=${QWEN_BASE_URL:-https://dashscope-us.aliyuncs.com/compatible-mode/v1}
      - APP__LLM__MODEL_NAME=${MODEL_NAME:-qwen3.5-flash}
      - APP__API__RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      - APP__API__ANONYMOUS_CHAT_RATE_LIMIT_PER_MINUTE=${ANONYMOUS_CHAT_RATE_LIMIT_PER_MINUTE:-12}
      - APP__API__RATE_LIMIT_BYPASS_KEY_IDS=${RATE_LIMIT_BYPASS_KEY_IDS:-}
      - APP__API__RATE_LIMIT_BYPASS_ROLES=${RATE_LIMIT_BYPASS_ROLES:-}
      - APP__RETRIEVAL__RETRIEVAL_OVERFETCH_MULTIPLIER=${RETRIEVAL_OVERFETCH_MULTIPLIER:-4}
      - APP__RETRIEVAL__MAX_CHUNKS_PER_SOURCE_PAGE=${MAX_CHUNKS_PER_SOURCE_PAGE:-2}
      - APP__RETRIEVAL__MAX_CHUNKS_PER_SOURCE=${MAX_CHUNKS_PER_SOURCE:-3}
      - APP__RETRIEVAL__MMR_LAMBDA=${MMR_LAMBDA:-0.75}
      - APP__RETRIEVAL__RRF_SEARCH_MODE=${RRF_SEARCH_MODE:-rrf_hybrid}
      - APP__API__CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174,http://localhost:3000}
      - APP__API__TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-false}
    cpus: 1.0
    mem_limit: 1g
    mem_reservation: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    cpus: 0.5
    mem_limit: 256m
    mem_reservation: 128m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173"]
      interval: 30s
      timeout: 5s
      retries: 5

  test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    profiles:
      - test
    working_dir: /app
    environment:
      - CI=true
      - PLAYWRIGHT_BASE_URL=http://frontend:5173
      - API_URL=http://backend:8000
    cpus: 2.0
    mem_limit: 2g
    mem_reservation: 1g
    depends_on:
      frontend:
        condition: service_healthy
