repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.(md|qmd)$
      - id: end-of-file-fixer
        exclude: \.(md|qmd)$
      - id: check-yaml
      - id: check-json
        exclude: tsconfig.json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-ast
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: ^docs/notebooks/html/
      - id: debug-statements
      - id: name-tests-test
        args: ['--pytest-test-first']

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.1
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: ^notebooks/
      - id: ruff-format
        exclude: ^notebooks/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.6.0
          - pydantic-settings>=2.6.0
        args: [--config-file=pyproject.toml]
        exclude: ^(tests/|frontend/|scripts/)

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        exclude: ^tests/

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: quarto-render
        name: Render changed .qmd notebooks
        entry: bash -c 'changed=$(git diff --cached --name-only -- "notebooks/*.qmd"); if [ -n "$changed" ]; then for f in $changed; do uv run quarto render "$f"; done; git add notebooks/_freeze/ docs/notebooks/html/; fi'
        language: system
        files: '^notebooks/.*\.qmd$'
        pass_filenames: false
