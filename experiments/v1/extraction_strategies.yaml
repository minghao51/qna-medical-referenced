schema_version: 1
metadata:
  name: extraction_strategies
  description: Compare PDF and HTML extraction strategies for quality
  owner: local
  hypothesis: "PyMuPDF+Camelot and html-to-markdown cascade will improve structured block quality over baseline"
  tags: [extraction, quality, pdf, html]
ingestion:
  page_classification_enabled: true
  index_only_classified_pages: true
  html_extractor_mode: auto
  html_extractor_strategy: trafilatura_bs
  pdf_extractor_strategy: pypdf_pdfplumber
  pdf_table_extractor: heuristic
  structured_chunking_enabled: true
  source_chunk_configs:
    pdf:
      chunk_size: 650
      chunk_overlap: 80
      strategy: recursive
      min_chunk_size: 140
    markdown:
      chunk_size: 600
      chunk_overlap: 80
      strategy: recursive
      min_chunk_size: 80
embedding_index:
  collection_name: medical_docs
  collection_name_suffix: extraction_strategies
  embedding_model: text-embedding-v4
  embedding_batch_size: 10
  semantic_weight: 0.6
  keyword_weight: 0.2
  boost_weight: 0.2
  rebuild_policy: if_missing_or_stale
  materialize_html: true
retrieval:
  top_k: 5
  search_mode: rrf_hybrid
  enable_diversification: true
  mmr_lambda: 0.75
  overfetch_multiplier: 4
  max_chunks_per_source_page: 2
  max_chunks_per_source: 3
dataset:
  path: tests/fixtures/golden_queries.json
  split: regression
  min_label_confidence: medium
  max_synthetic_questions: 40
  sample_docs_per_source_type: 10
  seed: 42
  enable_llm_generation: false
evaluation:
  artifact_dir: data/evals
  include_answer_eval: false
  disable_llm_judging: true
  fail_on_thresholds: false
  export_failed_generations: false
  run_retrieval_ablations: true
  run_diversity_sweep: false
  diversity_sweep: {}
tracking:
  wandb:
    enabled: false
    project: qna-medical-referenced
    entity: null
    group: pipeline-eval
    job_type: pipeline_eval
    tags: [extraction_strategies]
    notes: Compare PDF and HTML extraction strategy quality
    mode: online
    log_artifacts: true
    metrics_verbosity: standard
variants:
  # === Cross: baseline variants x PDF strategies ===
  # html_strict + PDF strategies
  - name: html_strict_pypdf
    overrides:
      ingestion:
        html_extractor_mode: fallback_only
        index_only_classified_pages: true
        pdf_extractor_strategy: pypdf_pdfplumber
        pdf_table_extractor: heuristic
  - name: html_strict_pymupdf
    overrides:
      ingestion:
        html_extractor_mode: fallback_only
        index_only_classified_pages: true
        pdf_extractor_strategy: pymupdf_pdfplumber
        pdf_table_extractor: heuristic
  - name: html_strict_pymupdf_camelot
    overrides:
      ingestion:
        html_extractor_mode: fallback_only
        index_only_classified_pages: true
        pdf_extractor_strategy: pymupdf_pdfplumber
        pdf_table_extractor: camelot
  # chunk_small + PDF strategies
  - name: chunk_small_pypdf
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            chunk_size: 480
            chunk_overlap: 64
          markdown:
            chunk_size: 480
            chunk_overlap: 64
        pdf_extractor_strategy: pypdf_pdfplumber
        pdf_table_extractor: heuristic
  - name: chunk_small_pymupdf
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            chunk_size: 480
            chunk_overlap: 64
          markdown:
            chunk_size: 480
            chunk_overlap: 64
        pdf_extractor_strategy: pymupdf_pdfplumber
        pdf_table_extractor: heuristic
  - name: chunk_small_pymupdf_camelot
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            chunk_size: 480
            chunk_overlap: 64
          markdown:
            chunk_size: 480
            chunk_overlap: 64
        pdf_extractor_strategy: pymupdf_pdfplumber
        pdf_table_extractor: camelot
  # rrf_mmr_tuned + PDF strategies
  - name: rrf_mmr_tuned_pypdf
    overrides:
      retrieval:
        enable_diversification: true
        mmr_lambda: 0.9
        overfetch_multiplier: 6
      ingestion:
        pdf_extractor_strategy: pypdf_pdfplumber
        pdf_table_extractor: heuristic
  - name: rrf_mmr_tuned_pymupdf
    overrides:
      retrieval:
        enable_diversification: true
        mmr_lambda: 0.9
        overfetch_multiplier: 6
      ingestion:
        pdf_extractor_strategy: pymupdf_pdfplumber
        pdf_table_extractor: heuristic
  - name: rrf_mmr_tuned_pymupdf_camelot
    overrides:
      retrieval:
        enable_diversification: true
        mmr_lambda: 0.9
        overfetch_multiplier: 6
      ingestion:
        pdf_extractor_strategy: pymupdf_pdfplumber
        pdf_table_extractor: camelot
  # === HTML strategy variants (baseline PDF) ===
  - name: html_html2md
    overrides:
      ingestion:
        html_extractor_strategy: html2md_trafilatura_bs
  - name: html_readability
    overrides:
      ingestion:
        html_extractor_strategy: readability_bs
  - name: html_fullcascade
    overrides:
      ingestion:
        html_extractor_strategy: full_cascade
  # === Combined: best PDF + best HTML ===
  - name: combined_best
    overrides:
      ingestion:
        pdf_extractor_strategy: pymupdf_pdfplumber
        pdf_table_extractor: camelot
        html_extractor_strategy: html2md_trafilatura_bs
  - name: combined_best_fullcascade
    overrides:
      ingestion:
        pdf_extractor_strategy: pymupdf_pdfplumber
        pdf_table_extractor: camelot
        html_extractor_strategy: full_cascade
