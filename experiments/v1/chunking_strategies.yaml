schema_version: 1
metadata:
  name: chunking_strategies
  description: Compare different chunking strategies (custom_recursive vs chonkie_recursive vs chonkie_semantic)
  owner: local
  hypothesis: Different chunking strategies affect retrieval quality for medical Q&A
  tags: [chunking, chonkie, semantic, evaluation]

ingestion:
  page_classification_enabled: true
  index_only_classified_pages: true
  html_extractor_mode: auto
  structured_chunking_enabled: true
  source_chunk_configs:
    pdf:
      chunk_size: 512
      chunk_overlap: 64
      strategy: custom_recursive
      min_chunk_size: 100
      embedding_model: text-embedding-v4
    markdown:
      chunk_size: 512
      chunk_overlap: 64
      strategy: custom_recursive
      min_chunk_size: 80
      embedding_model: text-embedding-v4

embedding_index:
  collection_name: medical_docs
  collection_name_suffix: chunking_strategies
  embedding_model: text-embedding-v4
  embedding_batch_size: 10
  semantic_weight: 0.6
  keyword_weight: 0.2
  boost_weight: 0.2
  rebuild_policy: if_missing_or_stale
  materialize_html: true

retrieval:
  top_k: 5
  search_mode: rrf_hybrid
  enable_diversification: true
  mmr_lambda: 0.75
  overfetch_multiplier: 4
  max_chunks_per_source_page: 2
  max_chunks_per_source: 3

dataset:
  path: tests/fixtures/golden_queries.json
  split: regression
  min_label_confidence: medium
  max_synthetic_questions: 40
  sample_docs_per_source_type: 10
  seed: 42
  enable_llm_generation: false

evaluation:
  artifact_dir: data/evals
  include_answer_eval: false
  disable_llm_judging: true
  fail_on_thresholds: false
  export_failed_generations: false
  run_retrieval_ablations: true
  run_diversity_sweep: false
  diversity_sweep: {}

tracking:
  wandb:
    enabled: false
    project: qna-medical-referenced
    entity: null
    group: chunking-eval
    job_type: chunking_eval
    tags: [chunking, chonkie, comparison]
    notes: Compare chunking strategies for medical RAG
    mode: online
    log_artifacts: true
    metrics_verbosity: standard

variants:
  # =====================================================================
  # Strategy Comparison: Same chunk size (512) across strategies
  # =====================================================================

  - name: custom_recursive_512
    description: Custom recursive chunker with quality scoring (512 tokens, 64 overlap)
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            strategy: custom_recursive
            chunk_size: 512
            chunk_overlap: 64
          markdown:
            strategy: custom_recursive
            chunk_size: 512
            chunk_overlap: 64

  - name: chonkie_recursive_512
    description: Chonkie's RecursiveChunker with overlap refinement (512 tokens)
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            strategy: chonkie_recursive
            chunk_size: 512
            chunk_overlap: 64
          markdown:
            strategy: chonkie_recursive
            chunk_size: 512
            chunk_overlap: 64

  - name: chonkie_semantic_512
    description: Chonkie's SemanticChunker with Qwen embeddings (512 tokens)
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            strategy: chonkie_semantic
            chunk_size: 512
          markdown:
            strategy: chonkie_semantic
            chunk_size: 512

  - name: chonkie_late_512
    description: Chonkie's LateChunker with Qwen embeddings (512 tokens)
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            strategy: chonkie_late
            chunk_size: 512
          markdown:
            strategy: chonkie_late
            chunk_size: 512

  # =====================================================================
  # Chunk Size Comparison: 384 tokens (smaller, more granular)
  # =====================================================================

  - name: custom_recursive_384
    description: Custom recursive chunker (384 tokens, smaller chunks)
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            strategy: custom_recursive
            chunk_size: 384
            chunk_overlap: 48
          markdown:
            strategy: custom_recursive
            chunk_size: 384
            chunk_overlap: 48

  - name: chonkie_recursive_384
    description: Chonkie's RecursiveChunker (384 tokens, smaller chunks)
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            strategy: chonkie_recursive
            chunk_size: 384
            chunk_overlap: 48
          markdown:
            strategy: chonkie_recursive
            chunk_size: 384
            chunk_overlap: 48

  - name: chonkie_semantic_384
    description: Chonkie's SemanticChunker (384 tokens, smaller chunks)
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            strategy: chonkie_semantic
            chunk_size: 384
          markdown:
            strategy: chonkie_semantic
            chunk_size: 384

  # =====================================================================
  # Chunk Size Comparison: 1024 tokens (larger, more context)
  # =====================================================================

  - name: custom_recursive_1024
    description: Custom recursive chunker (1024 tokens, larger chunks)
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            strategy: custom_recursive
            chunk_size: 1024
            chunk_overlap: 128
          markdown:
            strategy: custom_recursive
            chunk_size: 1024
            chunk_overlap: 128

  - name: chonkie_recursive_1024
    description: Chonkie's RecursiveChunker (1024 tokens, larger chunks)
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            strategy: chonkie_recursive
            chunk_size: 1024
            chunk_overlap: 128
          markdown:
            strategy: chonkie_recursive
            chunk_size: 1024
            chunk_overlap: 128

  - name: chonkie_semantic_1024
    description: Chonkie's SemanticChunker (1024 tokens, larger chunks)
    overrides:
      ingestion:
        source_chunk_configs:
          pdf:
            strategy: chonkie_semantic
            chunk_size: 1024
          markdown:
            strategy: chonkie_semantic
            chunk_size: 1024
