name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --frozen --dev

      - name: Run Ruff
        run: uv run ruff check

      - name: Run backend tests
        run: uv run pytest -m "not slow and not deepeval"

      - name: Run integration tests (optional)
        if: env.RUN_LIVE_QWEN_TESTS == '1' || env.RUN_DEEPEVAL_TESTS == '1'
        run: |
          if [ "${{ env.RUN_LIVE_QWEN_TESTS }}" == "1" ]; then
            echo "Running live API tests..."
            uv run pytest -m "live_api"
          fi
          if [ "${{ env.RUN_DEEPEVAL_TESTS }}" == "1" ]; then
            echo "Running DeepEval tests..."
            uv run pytest -m "deepeval"
          fi

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend checks
        run: bun run check

      - name: Build frontend
        run: bun run build

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile .
