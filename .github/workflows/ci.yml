name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --frozen --dev

      - name: Run Ruff
        run: uv run ruff check

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --frozen --dev

      - name: Run unit tests
        run: uv run pytest tests/unit/ -m "not slow" --maxfail=3 -n auto -q

  integration-tests:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --frozen --dev

      - name: Run integration tests
        run: uv run pytest tests/integration/ --maxfail=2 -q

  backend-smoke:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install backend dependencies
        run: uv sync --frozen --dev

      - name: Run backend smoke tests
        run: uv run pytest tests/unit/test_pipeline_assessment_smoke.py -m smoke --maxfail=1 -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.5

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend checks
        run: bun run check

      - name: Build frontend
        run: bun run build

      - name: Run frontend tests
        run: bun run test

  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile .
